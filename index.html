<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero - Cristóbal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #1f2937;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2563eb;
            text-align: center;
            margin-bottom: 5px;
        }
        p {
            color: #6b7280;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        .card {
            background-color: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 2px solid #cbd5e1;
        }
        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-close {
            background-color: #e5e7eb;
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Comunicación v15 (Actualizado)</h1>
    <p>Toca una tarjeta</p>

    <!-- Grilla fija en HTML para asegurar que los clics respondan de inmediato -->
    <div class="grid">
        <div class="card" onclick="abrir('Jugo', '🥤', 'audios/jugo_f.mp3')">
            <div class="card-icon">🥤</div>
            <div class="card-title">Jugo</div>
        </div>
        <div class="card" onclick="abrir('Pan', '🥙', 'audios/pan_f.mp3')">
            <div class="card-icon">🥙</div>
            <div class="card-title">Pan</div>
        </div>
        <div class="card" onclick="abrir('Tele', '🖥️', 'audios/tv_f.mp3')">
            <div class="card-icon">🖥️</div>
            <div class="card-title">Tele</div>
        </div>
        <div class="card" onclick="abrir('Dormir', '🛌', 'audios/dormir_f.mp3')">
            <div class="card-icon">🛌</div>
            <div class="card-title">Dormir</div>
        </div>
        <div class="card" onclick="abrir('Baño', '🚽', 'audios/bano_f.mp3')">
            <div class="card-icon">🚽</div>
            <div class="card-title">Baño</div>
        </div>
        <div class="card" onclick="abrir('Te amo', '🥰', 'audios/teamo_f.mp3')">
            <div class="card-icon">🥰</div>
            <div class="card-title">Te amo</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="myModal">
        <div class="modal-content">
            <div id="mIcon" style="font-size: 4rem;">🥤</div>
            <h2 id="mTitle" style="font-size: 2.2rem; color: #2563eb; margin: 10px 0;">Jugo</h2>
            <p style="color: #4b5563; font-size: 1.1rem;">Toca el botón verde:</p>
            
            <button class="btn" onclick="lanzarFrase()">✨ ¡Lo intenté!</button>
            <button class="btn btn-close" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        let audioActualPath = "";
        const modal = document.getElementById('myModal');
        const mTitle = document.getElementById('mTitle');
        const mIcon = document.getElementById('mIcon');

        function abrir(titulo, icono, audioRuta) {
            mTitle.innerText = titulo;
            mIcon.innerText = icono;
            audioActualPath = audioRuta;
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            modal.style.display = 'none';
        }

        function lanzarFrase() {
            cerrarModal();
            if (audioActualPath) {
                const reproductor = new Audio(audioActualPath);
                reproductor.play().catch(err => {
                    console.log("Error de audio:", err);
                });
            }
        }
    </script>
</body>
</html>
