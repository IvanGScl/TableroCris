<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Comunicación - Cristóbal</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-color: #1f2937;
            --accent: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary);
        }
        p.subtitle {
            color: #6b7280;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
        }
        .card:active {
            transform: scale(0.95);
        }
        .card-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h2 {
            font-size: 2.2rem;
            margin: 10px 0;
            color: var(--primary);
        }
        .prompt-box {
            background-color: #eff6ff;
            border: 2px dashed #bfdbfe;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        .prompt-text {
            font-size: 1.1rem;
            color: #1e40af;
            font-weight: 600;
            margin: 0;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 8px 5px;
            font-weight: bold;
            width: 100%;
        }
        .btn-success {
            background-color: var(--accent);
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-color);
        }
        .btn-audio {
            background-color: #f59e0b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Comunicación Cotidiana v6</h1>
        <p class="subtitle">Selecciona lo que necesitas</p>
    </header>

    <div class="grid" id="cardGrid"></div>

    <!-- Modal del Puente Vocal -->
    <div class="modal" id="speechModal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size: 4rem;">💧</div>
            <div class="prompt-box">
                <p class="prompt-text">Dilo tú:</p>
                <h2 id="modalWord">Tele</h2>
            </div>
            
            <!-- Botón de repetir con Sintetizador de voz -->
            <button class="btn btn-audio" onclick="speakSingleWordSynthesis()">🔊 Repetir palabra (Voz)</button>
            
            <!-- Botón de validación con audio grabado -->
            <button class="btn btn-success" onclick="validateAndPlayPhrase()">✨ ¡Lo intenté! (Frase completa)</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const items = [
            { id: 1, title: "Jugo", icon: "🥤", audioPhrase: "audios/jugo_f.mp3" },
            { id: 2, title: "Pan", icon: "🥙", audioPhrase: "audios/pan_f.mp3" },
            { id: 3, title: "Tele", icon: "🖥️", audioPhrase: "audios/tv_f.mp3" },
            { id: 4, title: "Dormir", icon: "🛌", audioPhrase: "audios/dormir_f.mp3" },
            { id: 5, title: "Baño", icon: "🚽", audioPhrase: "audios/bano_f.mp3" },
            { id: 6, title: "Te amo", icon: "🥰", audioPhrase: "audios/teamo_f.mp3" }
        ];

        let selectedItem = null;
        let currentAudio = null;
        let voices = [];

        const grid = document.getElementById('cardGrid');
        const modal = document.getElementById('speechModal');
        const modalWord = document.getElementById('modalWord');
        const modalIcon = document.getElementById('modalIcon');

        // Cargar voces para el sintetizador
        function loadVoices() {
            if ('speechSynthesis' in window) {
                voices = window.speechSynthesis.getVoices();
            }
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        function renderCards() {
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-icon">${item.icon}</div>
                    <div class="card-title">${item.title}</div>
                `;
                card.onclick = () => openItem(item);
                grid.appendChild(card);
            });
        }

        function openItem(item) {
            selectedItem = item;
            modalWord.innerText = item.title;
            modalIcon.innerText = item.icon;
            modal.style.display = 'flex';
            
            // Forzamos el salto del audio asegurando que el popup ya se pintó
            setTimeout(() => {
                speakSingleWordSynthesis();
            }, 100);
        }

        function closeModal() {
            modal.style.display = 'none';
            if (currentAudio) {
                currentAudio.pause();
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // Sintetizador para repetir la palabra de forma guiada
        function speakSingleWordSynthesis() {
            if ('speechSynthesis' in window && selectedItem) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(selectedItem.title);
                utterance.lang = 'es-ES';
                utterance.rate = 0.8;
                
                const spanishVoices = voices.filter(v => v.lang.includes('es'));
                if (spanishVoices.length > 0) {
                    utterance.voice = spanishVoices[0];
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        // Frase completa con audio grabado
        function validateAndPlayPhrase() {
            closeModal();
            if (selectedItem && selectedItem.audioPhrase) {
                if (currentAudio) currentAudio.pause();
                currentAudio = new Audio(selectedItem.audioPhrase);
                currentAudio.play().catch(e => console.log("Audio grabado no encontrado, asegúrate de subirlo a la carpeta audios/"));
            }
        }

        renderCards();
    </script>
</body>
</html>
