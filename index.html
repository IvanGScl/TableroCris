<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Comunicación - Cristóbal</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-color: #1f2937;
            --accent: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary);
        }
        p.subtitle {
            color: #6b7280;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
        }
        .card:active {
            transform: scale(0.95);
        }
        .card-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
        }
        /* Modal de interacción de voz */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary);
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-color);
        }
        .btn-success {
            background-color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <h1>Comunicación Cotidiana</h1>
        <p class="subtitle">Toca una opción para expresarte</p>
    </header>

    <div class="grid" id="cardGrid">
        <!-- Las tarjetas se generan por JavaScript -->
    </div>

    <!-- Modal de práctica de habla -->
    <div class="modal" id="speechModal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size: 4rem;">💧</div>
            <h2 id="modalWord">Agua</h2>
            <p>Dilo en voz alta y presiona Reproducir</p>
            <button class="btn btn-success" onclick="speakOutLoud()">🔊 Reproducir Mensaje</button>
            <br>
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar / Volver</button>
        </div>
    </div>

    <script>
        // Datos iniciales de ejemplo (ajustables a sus gustos reales)
        const items = [
            { id: 1, title: "Agua", icon: "💧", phrase: "Quiero un vaso de agua por favor" },
            { id: 2, title: "Música", icon: "🎧", phrase: "Quiero escuchar música" },
            { id: 3, title: "Comida", icon: "🍽️", phrase: "Tengo hambre, quiero comer" },
            { id: 4, title: "Café", icon: "☕", phrase: "Quiero un café" },
            { id: 5, title: "Salir", icon: "🚶‍♂️", phrase: "Quiero salir a caminar" },
            { id: 6, title: "Descansar", icon: "🛋️", phrase: "Quiero descansar un momento" }
        ];

        let selectedPhrase = "";

        const grid = document.getElementById('cardGrid');
        const modal = document.getElementById('speechModal');
        const modalWord = document.getElementById('modalWord');
        const modalIcon = document.getElementById('modalIcon');

        // Renderizar tarjetas
        function renderCards() {
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.div = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-icon">${item.icon}</div>
                    <div class="card-title">${item.title}</div>
                `;
                card.onclick = () => openItem(item);
                grid.appendChild(card);
            });
        }

        function openItem(item) {
            selectedPhrase = item.phrase;
            modalWord.innerText = item.title;
            modalIcon.innerText = item.icon;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Síntesis de voz nativa del navegador / dispositivo
        function speakOutLoud() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(selectedPhrase);
                utterance.lang = 'es-ES';
                utterance.rate = 0.9; // Velocidad natural y pausada
                window.speechSynthesis.speak(utterance);
            } else {
                alert(selectedPhrase);
            }
            closeModal();
        }

        renderCards();
    </script>
</body>
</html>
