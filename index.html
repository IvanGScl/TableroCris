<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Comunicación - Cristóbal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #1f2937;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2563eb;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        .card {
            background-color: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 2px solid #ccc;
        }
        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-close {
            background-color: #e5e7eb;
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Comunicación Cotidiana v13</h1>
    <p>Toca una opción</p>

    <div class="grid" id="cardGrid"></div>

    <!-- Modal -->
    <div class="modal" id="myModal">
        <div class="modal-content">
            <div id="mIcon" style="font-size: 4rem;">🥤</div>
            <h2 id="mTitle" style="font-size: 2rem; color: #2563eb; margin: 10px 0;">Jugo</h2>
            <p style="color: #555;">Toca el botón verde cuando estés listo:</p>
            
            <button class="btn" onclick="lanzarFrase()">✨ ¡Lo intenté!</button>
            <button class="btn btn-close" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const items = [
            { id: 1, title: "Jugo", icon: "🥤", frase: "Quiero tomar jugo", audio: "audios/jugo_f.mp3" },
            { id: 2, title: "Pan", icon: "🥙", frase: "Quiero comer pan", audio: "audios/pan_f.mp3" },
            { id: 3, title: "Tele", icon: "🖥️", frase: "Quiero ver Televisión", audio: "audios/tv_f.mp3" },
            { id: 4, title: "Dormir", icon: "🛌", frase: "Quiero ir a dormir", audio: "audios/dormir_f.mp3" },
            { id: 5, title: "Baño", icon: "🚽", frase: "Quiero ir al baño", audio: "audios/bano_f.mp3" },
            { id: 6, title: "Te amo", icon: "🥰", frase: "Te amo", audio: "audios/teamo_f.mp3" }
        ];

        let itemActual = null;
        const grid = document.getElementById('cardGrid');
        const modal = document.getElementById('myModal');
        const mTitle = document.getElementById('mTitle');
        const mIcon = document.getElementById('mIcon');

        // Dibujar tarjetas
        function iniciar() {
            grid.innerHTML = "";
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-icon">${item.icon}</div>
                    <div class="card-title">${item.title}</div>
                `;
                div.onclick = function() {
                    abrirModal(item);
                };
                grid.appendChild(div);
            });
        }

        function abrirModal(item) {
            itemActual = item;
            mTitle.innerText = item.title;
            mIcon.innerText = item.icon;
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            modal.style.display = 'none';
        }

        function lanzarFrase() {
            cerrarModal();
            if (itemActual && itemActual.audio) {
                const reproductor = new Audio(itemActual.audio);
                reproductor.play().catch(err => {
                    console.log("Error reproduciendo audio:", err);
                    alert("No se encontró el archivo de audio en la carpeta audios/");
                });
            }
        }

        iniciar();
    </script>
</body>
</html>
